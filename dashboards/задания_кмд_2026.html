<title>Задания на КМД — 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;background:#f5f6fa;color:#2c3e50;padding:20px}
.container{max-width:1440px;margin:0 auto}
h1{font-size:24px;font-weight:600;color:#1a1a2e;margin-bottom:20px;display:flex;align-items:center;gap:10px}
h1 small{font-size:14px;font-weight:400;color:#7f8c8d}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.kpi-card{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:4px solid #3498db}
.kpi-card .label{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#7f8c8d;margin-bottom:6px}
.kpi-card .value{font-size:28px;font-weight:700;color:#2c3e50}
.kpi-card .sub{font-size:13px;color:#95a5a6;margin-top:4px}
.kpi-card.warn{border-left-color:#f39c12}
.kpi-card.danger{border-left-color:#e74c3c}
.kpi-card.success{border-left-color:#27ae60}
.kpi-card.info{border-left-color:#3498db}
.kpi-card.purple{border-left-color:#9b59b6}
.filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;align-items:center}
.filters select,.filters input{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#2c3e50;outline:none}
.filters select:focus,.filters input:focus{border-color:#3498db;box-shadow:0 0 0 2px rgba(52,152,219,.15)}
.filters select{min-width:160px}
.filters input[type="search"]{min-width:220px}
.filters label{font-size:13px;color:#555;display:flex;align-items:center;gap:6px}
.tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:20px;border-bottom:2px solid #eef0f4}
.tab-btn{padding:10px 20px;background:none;border:none;cursor:pointer;font-size:14px;font-weight:500;color:#7f8c8d;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab-btn:hover{color:#2c3e50}
.tab-btn.active{color:#3498db;border-bottom-color:#3498db}
.tab-btn .count{background:#eef0f4;border-radius:10px;padding:2px 8px;font-size:12px;margin-left:6px}
.tab-btn.active .count{background:#d6eaf8;color:#2980b9}
.table-wrap{overflow-x:auto;background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
th{background:#f8f9fb;text-align:left;padding:12px 14px;font-weight:600;color:#555;border-bottom:2px solid #eef0f4;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:#2c3e50}
th .sort-icon{display:inline-block;width:14px;margin-left:4px;color:#bbb}
th.sorted .sort-icon{color:#3498db}
td{padding:10px 14px;border-bottom:1px solid #f0f0f0;color:#2c3e50}
tr:hover td{background:#f8f9fb}
.status{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500}
.status-1{background:#e8f4fd;color:#2980b9}
.status-2{background:#fef9e7;color:#d68910}
.status-3{background:#eafaf1;color:#27ae60}
.status-4{background:#fdf2f2;color:#c0392b}
.status-5{background:#f5eef8;color:#8e44ad}
.status-6{background:#fdebd0;color:#d35400}
.chart-container{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:20px}
.chart-title{font-size:16px;font-weight:600;margin-bottom:16px;color:#2c3e50}
.bar-chart{display:flex;align-items:flex-end;gap:20px;height:220px;padding:0 10px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:70px;min-height:4px;border-radius:6px 6px 0 0;transition:height .4s;position:relative;cursor:pointer}
.bar:hover{opacity:.85}
.bar .bar-val{position:absolute;top:-24px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:600;color:#2c3e50}
.bar-label{margin-top:10px;font-size:12px;color:#7f8c8d;text-align:center;max-width:100px}
.overdue{color:#e74c3c;font-weight:600}
.days-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:500}
.days-overdue{background:#fdf2f2;color:#e74c3c}
.days-ok{background:#eafaf1;color:#27ae60}
.days-warn{background:#fef9e7;color:#d68910}
.tab-content{display:none}
.tab-content.active{display:block}
@media (max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.filters{flex-direction:column;align-items:stretch}.filters select,.filters input{width:100%}}
</style>
</head>

    '<div class="kpi-card danger"><div class="label">Просрочено</div><div class="value">'+kpi.overdue+'</div><div class="sub">'+(kpi.total>0?Math.round(kpi.overdue/kpi.total*100):0)+'% от всех</div></div>' +
    '<div class="kpi-card purple"><div class="label">Площадь невып. (м²)</div><div class="value">'+kpi.notCompletedArea+'</div><div class="sub">по невыполненным заданиям</div></div>' +
    '<div class="kpi-card success"><div class="label">Выполнено</div><div class="value">'+kpi.completed+'</div><div class="sub">'+(kpi.total>0?Math.round(kpi.completed/kpi.total*100):0)+'% выполнения</div></div>' +
    '</div>' +
    '<div class="filters">' +
    '<label>Статус: <select id="f-status"><option value="0">Все</option>'+sm+'</select></label>' +
    '<label>Конструктор: <select id="f-constructor">'+co+'</select></label>' +
    '<label>Объект: <select id="f-object">'+oo+'</select></label>' +
    '<input type="search" id="f-search" placeholder="Поиск..." value="'+filterSearch+'">' +
    '</div>' +
    '<div class="tabs">' +
    '<button class="tab-btn active" data-tab="inwork">В работе <span class="count">'+kpi.inWork+'</span></button>' +
    '<button class="tab-btn" data-tab="overdue">Просроченные <span class="count">'+kpi.overdue+'</span></button>' +
    '<button class="tab-btn" data-tab="statuses">Статусы</button>' +
    '<button class="tab-btn" data-tab="constructors">Конструкторы</button>' +
    '<button class="tab-btn" data-tab="all">Все задания <span class="count">'+records.length+'</span></button>' +
    '</div>' +
    '<div id="tab-inwork" class="tab-content active">'+renderTable(records.filter(function(r){return r.status===2;}),'inwork')+'</div>' +
    '<div id="tab-overdue" class="tab-content">'+renderTable(records.filter(function(r){return r.endAt&&new Date(r.endAt)<now&&r.status!==3;}),'overdue')+'</div>' +
    '<div id="tab-statuses" class="tab-content">'+renderStatuses()+'</div>' +
    '<div id="tab-constructors" class="tab-content">'+renderConstructors()+'</div>' +
    '<div id="tab-all" class="tab-content">'+renderTable(records,'all')+'</div>';
  bindEvents();
}

function renderTable(items, mode) {
  if (items.length === 0) return '<div class="table-wrap" style="padding:40px;text-align:center;color:#95a5a6;">Нет данных</div>';
  var sorted = items.slice().sort(function(a,b) { return (b.createdAt||'').localeCompare(a.createdAt||''); });
  var isInWork = mode === 'inwork';
  var isOverdue = mode === 'overdue';
  var h = '<div class="tab-header"><h2>'+(isInWork?'Задания в работе':isOverdue?'Просроченные задания':'Все задания')+'</h2><span class="info">'+items.length+' заданий</span></div><div class="table-wrap"><table><thead><tr>';
  if (isInWork) {
    h += '<th data-sort="name">Название <span class="sort-icon">↕</span></th><th data-sort="object">Объект <span class="sort-icon">↕</span></th><th data-sort="constructor">Конструктор <span class="sort-icon">↕</span></th><th data-sort="korpus">Корпус <span class="sort-icon">↕</span></th><th data-sort="section">Секция <span class="sort-icon">↕</span></th><th data-sort="square" data-type="number">Площадь, м² <span class="sort-icon">↕</span></th><th data-sort="end" data-type="number">Плановая дата <span class="sort-icon">↕</span></th><th data-sort="days" data-type="number">Дней до дедлайна <span class="sort-icon">↕</span></th>';
  } else if (isOverdue) {
    h += '<th data-sort="name">Название <span class="sort-icon">↕</span></th><th data-sort="status" data-type="number">Статус <span class="sort-icon">↕</span></th><th data-sort="constructor">Конструктор <span class="sort-icon">↕</span></th><th data-sort="square" data-type="number">Площадь, м² <span class="sort-icon">↕</span></th><th data-sort="end" data-type="number">Плановая дата <span class="sort-icon">↕</span></th><th data-sort="days" data-type="number">Дней просрочки <span class="sort-icon">↕</span></th>';
  } else {
    h += '<th data-sort="name">Название <span class="sort-icon">↕</span></th><th data-sort="status" data-type="number">Статус <span class="sort-icon">↕</span></th><th data-sort="object">Объект <span class="sort-icon">↕</span></th><th data-sort="constructor">Конструктор <span class="sort-icon">↕</span></th><th data-sort="square" data-type="number">Площадь, м² <span class="sort-icon">↕</span></th><th data-sort="end" data-type="number">План <span class="sort-icon">↕</span></th><th data-sort="created" data-type="number">Создано <span class="sort-icon">↕</span></th>';
  }
  h += '</tr></thead><tbody>';
  for (var i = 0; i < sorted.length; i++) {
    var r = sorted[i];
    var daysLeft = r.endAt ? daysDiff(r.endAt, now.toISOString()) : null;
    var daysOver = r.endAt ? Math.abs(daysDiff(r.endAt, now.toISOString())) : 0;
    var daysStr = daysLeft !== null ? (daysLeft >= 0 ? daysLeft+' дн.' : 'просрочено на '+Math.abs(daysLeft)+' дн.') : '—';
    var daysClass = daysLeft !== null ? (daysLeft < 0 ? 'days-overdue' : daysLeft <= 7 ? 'days-warn' : 'days-ok') : '';
    if (isInWork) {
      h += '<tr><td><strong>'+esc(r.name)+'</strong></td><td>'+esc(r.object)+'</td><td>'+esc(r.constructor)+'</td><td>'+(r.korpus||'—')+'</td><td>'+(r.section||'—')+'</td><td>'+(r.square>0?r.square.toFixed(2):'—')+'</td><td>'+fmtDate(r.endAt)+'</td><td><span class="days-badge '+daysClass+'">'+daysStr+'</span></td></tr>';
    } else if (isOverdue) {
      h += '<tr><td><strong>'+esc(r.name)+'</strong></td><td><span class="status status-'+r.status+'">'+r.statusText+'</span></td><td>'+esc(r.constructor)+'</td><td>'+(r.square>0?r.square.toFixed(2):'—')+'</td><td>'+fmtDate(r.endAt)+'</td><td><span class="days-badge days-overdue">'+daysOver+' дн.</span></td></tr>';
    } else {
      h += '<tr><td><strong>'+esc(r.name)+'</strong></td><td><span class="status status-'+r.status+'">'+r.statusText+'</span></td><td>'+esc(r.object)+'</td><td>'+esc(r.constructor)+'</td><td>'+(r.square>0?r.square.toFixed(2):'—')+'</td><td>'+fmtDate(r.endAt)+'</td><td>'+fmtDate(r.createdAt)+'</td></tr>';
    }
  }
  h += '</tbody></table></div>';
  return h;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderStatuses() {
  var maxCount = 1;
  for (var sk in statusStats) { if (statusStats[sk].count > maxCount) maxCount = statusStats[sk].count; }
  var colors = {1:'#2980b9',2:'#d68910',3:'#27ae60',4:'#c0392b',5:'#8e44ad',6:'#d35400'};
  var bars = '';
  for (var s = 1; s <= 6; s++) {
    var info = statusStats[s] || {count:0, area:0};
    var h = maxCount > 0 ? (info.count / maxCount * 200) : 0;
    bars += '<div class="bar-group"><div class="bar" style="height:'+Math.max(h,4)+'px;background:'+colors[s]+'"><div class="bar-val">'+info.count+'</div></div><div class="bar-label">'+STATUS_MAP[s]+'</div></div>';
  }
  var table = '<div class="table-wrap" style="margin-top:20px"><table><thead><tr><th>Статус</th><th data-type="number">Количество</th><th data-type="number">Площадь, м²</th><th data-type="number">% от общего</th></tr></thead><tbody>';
  for (var s = 1; s <= 6; s++) {
    var info = statusStats[s] || {count:0, area:0};
    var pct = records.length > 0 ? (info.count / records.length * 100) : 0;
    table += '<tr><td><span class="status status-'+s+'">'+STATUS_MAP[s]+'</span></td><td><strong>'+info.count+'</strong></td><td>'+info.area.toFixed(2)+'</td><td>'+pct.toFixed(1)+'%</td></tr>';
  }
  table += '</tbody></table></div>';
  return '<div class="chart-container"><div class="chart-title">Распределение заданий по статусам</div><div class="bar-chart">'+bars+'</div></div>'+table;
}

function renderConstructors() {
  var arr = [];
  for (var cid in constructorStats) {
    var cs = constructorStats[cid];
    arr.push({id:cid, name:cs.name, total:cs.total, inWork:cs.inWork, area:cs.area});
  }
  arr.sort(function(a,b){return b.total-a.total;});
  if (arr.length === 0) return '<div class="table-wrap" style="padding:40px;text-align:center;color:#95a5a6;">Нет данных</div>';
  var h = '<div class="tab-header"><h2>Сводка по конструкторам</h2><span class="info">'+arr.length+' конструкторов</span></div><div class="table-wrap"><table><thead><tr><th data-sort="name">Конструктор <span class="sort-icon">↕</span></th><th data-sort="total" data-type="number">Всего <span class="sort-icon">↕</span></th><th data-sort="inwork" data-type="number">В работе <span class="sort-icon">↕</span></th><th data-sort="area" data-type="number">Площадь, м² <span class="sort-icon">↕</span></th></tr></thead><tbody>';
  for (var i = 0; i < arr.length; i++) {
    var c = arr[i];
    h += '<tr><td><strong>'+esc(c.name||'Не указан')+'</strong></td><td>'+c.total+'</td><td>'+c.inWork+'</td><td>'+c.area.toFixed(2)+'</td></tr>';
  }
  h += '</tbody></table></div>';
  return h;
}

function updateFilteredTabs() {
  var fa = filteredList(records);
  var fiw = filteredList(inWork);
  var fod = filteredList(overdue);
  document.getElementById('tab-inwork').innerHTML = renderTable(fiw,'inwork');
  document.getElementById('tab-overdue').innerHTML = renderTable(fod,'overdue');
  document.getElementById('tab-statuses').innerHTML = renderStatuses();
  document.getElementById('tab-constructors').innerHTML = renderConstructors();
  document.getElementById('tab-all').innerHTML = renderTable(fa,'all');
  var btns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < btns.length; i++) {
    var btn = btns[i];
    var t = btn.dataset.tab;
    var counts = {inwork:fiw.length, overdue:fod.length, all:fa.length};
    var sp = btn.querySelector('.count');
    if (sp && counts[t] !== undefined) sp.textContent = counts[t];
  }
}

function bindEvents() {
  document.getElementById('f-status').addEventListener('change', function() { filterStatus = this.value; updateFilteredTabs(); });
  document.getElementById('f-constructor').addEventListener('change', function() { filterConstructor = this.value; updateFilteredTabs(); });
  document.getElementById('f-object').addEventListener('change', function() { filterObject = this.value; updateFilteredTabs(); });
  document.getElementById('f-search').addEventListener('input', function() { filterSearch = this.value; updateFilteredTabs(); });
  var btns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].addEventListener('click', function() {
      var btns2 = document.querySelectorAll('.tab-btn');
      for (var j = 0; j < btns2.length; j++) btns2[j].classList.remove('active');
      var tabs = document.querySelectorAll('.tab-content');
      for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');
      this.classList.add('active');
      document.getElementById('tab-'+this.dataset.tab).classList.add('active');
    });
  }
  document.getElementById('app').addEventListener('click', function(e) {
    var th = e.target.closest('th[data-sort]');
    if (!th) return;
    var table = th.closest('table'); if (!table) return;
    var tbody = table.querySelector('tbody'); if (!tbody) return;
    var ths = th.parentElement.children;
    var idx = 0; while (idx < ths.length && ths[idx] !== th) idx++;
    var isNum = th.dataset.type === 'number';
    var rows = Array.from(tbody.querySelectorAll('tr'));
    var dir = th.classList.contains('sorted-asc') ? -1 : 1;
    rows.sort(function(a,b) {
      var va = (a.children[idx] ? a.children[idx].textContent : '').trim();
      var vb = (b.children[idx] ? b.children[idx].textContent : '').trim();
      if (isNum) { var na=parseFloat(va.replace(/[^0-9.,\-]/g,'').replace(',','.'))||0; var nb=parseFloat(vb.replace(/[^0-9.,\-]/g,'').replace(',','.'))||0; return (na-nb)*dir; }
      return va.localeCompare(vb)*dir;
    });
    for (var i = 0; i < rows.length; i++) tbody.appendChild(rows[i]);
    var ths2 = table.querySelectorAll('th');
    for (var i = 0; i < ths2.length; i++) ths2[i].classList.remove('sorted','sorted-asc','sorted-desc');
    th.classList.add('sorted', dir===1?'sorted-asc':'sorted-desc');
  });
}

render();

</script>
</body>
</html>
