<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализ работ по тендерам</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-main);
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .kpi-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        .filters-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .tile-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tile {
            padding: 6px 12px;
            background: #f1f5f9;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            user-select: none;
        }

        .tile:hover {
            background: #e2e8f0;
        }

        .tile.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary-dark);
        }

        .dropdown {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            width: 250px;
            outline: none;
        }

        .type-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .type-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .type-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .type-card.active {
            border-color: var(--primary);
            background: #eff6ff;
        }

        .type-card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .type-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 14px;
        }

        .metric-item {
            display: flex;
            flex-direction: column;
        }

        .metric-label {
            color: var(--text-muted);
            font-size: 12px;
        }

        .metric-value {
            font-weight: 600;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .table-controls {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 300px;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }

        th {
            background: #f8fafc;
            padding: 12px 15px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        th:hover {
            background: #f1f5f9;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
        }

        tr:hover {
            background: #f8fafc;
        }

        .num-cell {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Анализ работ по тендерам</h1>

        <div class="kpi-grid" id="kpi">
            <div class="kpi-card">
                <div class="kpi-label">Общая площадь</div>
                <div class="kpi-value" id="kpi-area">0 м²</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Общая стоимость</div>
                <div class="kpi-value" id="kpi-cost">0 руб.</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Средняя цена за м²</div>
                <div class="kpi-value" id="kpi-avg-price">0 руб.</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Всего работ</div>
                <div class="kpi-value" id="kpi-count">0 шт.</div>
            </div>
        </div>

        <div class="filters-section">
            <div class="filter-group">
                <div class="filter-title">Период (Год / Месяц)</div>
                <div class="tile-group" id="year-tiles"></div>
                <div class="tile-group" id="month-tiles" style="margin-top: 10px;"></div>
            </div>
            <div class="filter-group">
                <div class="filter-title">Инициатор</div>
                <select class="dropdown" id="initiator-select">
                    <option value="all">Все инициаторы</option>
                </select>
            </div>
        </div>

        <div class="type-grid" id="type-cards"></div>

        <div class="table-container">
            <div class="table-controls">
                <input type="text" class="search-input" id="search" placeholder="Поиск по работам, объектам, тендерам...">
                <div style="font-size: 14px; color: var(--text-muted)" id="table-info">Всего записей: 0</div>
            </div>
            <div style="overflow-x: auto;">
                <table id="main-table">
                    <thead>
                        <tr>
                            <th onclick="sortData('название')">Название работы</th>
                            <th onclick="sortData('тип_работы')">Тип работы</th>
                            <th onclick="sortData('объект')">Объект</th>
                            <th onclick="sortData('тендер')">Тендер</th>
                            <th onclick="sortData('инициатор_работ')">Инициатор</th>
                            <th class="num-cell" onclick="sortData('квадратура')">Площадь (м²)</th>
                            <th class="num-cell" onclick="sortData('общая_стоимость')">Общая стоимость</th>
                            <th class="num-cell" onclick="sortData('цена_за_м2')">Цена за м²</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

        let currentFilters = {{
            year: null,
            month: null,
            initiator: 'all',
            type: null,
            search: ''
        }};

        let currentSort = {{
            field: 'дата_создания',
            direction: 'desc'
        }};

        function formatNumber(num) {{
            return new Intl.NumberFormat('ru-RU').format(num);
        }}

        function formatCurrency(num) {{
            return new Intl.NumberFormat('ru-RU', {{ style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }}).format(num);
        }}

        function updateDashboard() {{
            const filteredData = data.filter(item => {{
                const matchesYear = !currentFilters.year || item.год === currentFilters.year;
                const matchesMonth = !currentFilters.month || item.месяц === currentFilters.month;
                const matchesInitiator = currentFilters.initiator === 'all' || item.инициатор_работ === currentFilters.initiator;
                const matchesType = !currentFilters.type || item.тип_работы === currentFilters.type;
                const matchesSearch = !currentFilters.search ||
                    (item.название && item.название.toLowerCase().includes(currentFilters.search)) ||
                    (item.объект && item.объект.toLowerCase().includes(currentFilters.search)) ||
                    (item.тендер && item.тендер.toLowerCase().includes(currentFilters.search));

                return matchesYear && matchesMonth && matchesInitiator && matchesType && matchesSearch;
            }});

            // KPIs
            const totalArea = filteredData.reduce((sum, item) => sum + (item.квадратура || 0), 0);
            const totalCost = filteredData.reduce((sum, item) => sum + (item.общая_стоимость || 0), 0);
            const count = filteredData.length;
            const avgPrice = totalArea > 0 ? totalCost / totalArea : 0;

            document.getElementById('kpi-area').textContent = `${{formatNumber(totalArea)}} м²`;
            document.getElementById('kpi-cost').textContent = formatCurrency(totalCost);
            document.getElementById('kpi-avg-price').textContent = formatCurrency(avgPrice);
            document.getElementById('kpi-count').textContent = `${{formatNumber(count)}} шт.`;

            renderTypeCards();
            renderTable(filteredData);
            document.getElementById('table-info').textContent = `Всего записей: ${{formatNumber(count)}}`;
        }}

        function renderTypeCards() {{
            const typeMetrics = {{}};
            data.forEach(item => {{
                const type = item.тип_работы || 'Не указан';
                if (!typeMetrics[type]) {{
                    typeMetrics[type] = {{ area: 0, cost: 0, count: 0 }};
                }}
                typeMetrics[type].area += (item.квадратура || 0);
                typeMetrics[type].cost += (item.общая_стоимость || 0);
                typeMetrics[type].count++;
            }});

            const container = document.getElementById('type-cards');
            container.innerHTML = '';

            Object.entries(typeMetrics).sort((a, b) => b[1].cost - a[1].cost).forEach(([type, metrics]) => {{
                const card = document.createElement('div');
                card.className = `type-card ${{currentFilters.type === type ? 'active' : ''}}`;
                card.onclick = () => {{
                    currentFilters.type = currentFilters.type === type ? null : type;
                    updateDashboard();
                }};
                card.innerHTML = `
                    <div class="type-card-title">${{type}}</div>
                    <div class="type-metrics">
                        <div class="metric-item">
                            <span class="metric-label">Площадь</span>
                            <span class="metric-value">${{formatNumber(metrics.area)}} м²</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">Стоимость</span>
                            <span class="metric-value">${{formatCurrency(metrics.cost)}}</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">Кол-во</span>
                            <span class="metric-value">${{metrics.count}}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }});
        }}

        function renderTable(filteredData) {{
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            const sortedData = [...filteredData].sort((a, b) => {{
                let valA = a[currentSort.field];
                let valB = b[currentSort.field];

                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();

                if (valA < valB) return currentSort.direction === 'asc' ? -1 : 1;
                if (valA > valB) return currentSort.direction === 'asc' ? 1 : -1;
                return 0;
            }});

            sortedData.forEach(item => {{
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${{item.название || 'Не указан'}}</td>
                    <td>${{item.тип_работы || 'Не указан'}}</td>
                    <td>${{item.объект || 'Не указан'}}</td>
                    <td>${{item.тендер || 'Не указан'}}</td>
                    <td>${{item.инициатор_работ || 'Не указан'}}</td>
                    <td class="num-cell">${{formatNumber(item.квадратура || 0)}}</td>
                    <td class="num-cell">${{formatCurrency(item.общая_стоимость || 0)}}</td>
                    <td class="num-cell">${{formatCurrency(item.цена_за_м2 || 0)}}</td>
                `;
                tbody.appendChild(tr);
            }});
        }}

        function sortData(field) {{
            if (currentSort.field === field) {{
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            }} else {{
                currentSort.field = field;
                currentSort.direction = 'asc';
            }}
            updateDashboard();
        }}

        function initFilters() {{
            const years = [...new Set(data.map(item => item.год))].sort((a, b) => b - a);
            const yearContainer = document.getElementById('year-tiles');
            years.forEach(year => {{
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.textContent = year;
                tile.onclick = () => {{
                    document.querySelectorAll('#year-tiles .tile').forEach(t => t.classList.remove('active'));
                    if (currentFilters.year === year) {{
                        currentFilters.year = null;
                    }} else {{
                        currentFilters.year = year;
                        tile.classList.add('active');
                    }}
                    updateDashboard();
                }};
                yearContainer.appendChild(tile);
            }});

            const months = ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12"];
            const monthContainer = document.getElementById('month-tiles');
            months.forEach(month => {{
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.textContent = month;
                tile.onclick = () => {{
                    document.querySelectorAll('#month-tiles .tile').forEach(t => t.classList.remove('active'));
                    if (currentFilters.month === month) {{
                        currentFilters.month = null;
                    }} else {{
                        currentFilters.month = month;
                        tile.classList.add('active');
                    }}
                    updateDashboard();
                }};
                monthContainer.appendChild(tile);
            }});

            const initiators = [...new Set(data.map(item => item.инициатор_работ).filter(i => i && i !== 'Не указан'))].sort();
            const select = document.getElementById('initiator-select');
            initiators.forEach(init => {{
                const opt = document.createElement('option');
                opt.value = init;
                opt.textContent = init;
                select.appendChild(opt);
            }});

            select.onchange = (e) => {{
                currentFilters.initiator = e.target.value;
                updateDashboard();
            }});

            document.getElementById('search').oninput = (e) => {{
                currentFilters.search = e.target.value.toLowerCase();
                updateDashboard();
            }});
        }}

        initFilters();
        updateDashboard();
    </script>
